<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소생성</title>
</head>
<body>

    <div id="container">
        <h1>웹 프로그래밍</h1>
        <!-- p태그 생성 -->
    </div>

    <div class="notice">
        <!-- js출력 -->
         <span>안녕하세요</span>
    </div>


    <script>

        //p태그생성
        const newP =document.createElement("p")
        console.log(newP);
        const txtNode = document.createTextNode("DOM"); // dom은 document object model의 줄임말이다
        console.log(txtNode);
        // p태그에 글자를 넣는다.

    newP.appendChild(txtNode);
    // container 영역안에 p태그 연결
    document.getElementById("container").appendChild(newP)


    const newN =document.createElement("notice")
        console.log(newN);
        const txtNotice = document.createTextNode("안녕하세요"); // dom은 document object model의 줄임말이다
        console.log(txtNotice);


newN.appendChild(txtNotice); //글자를 집어넣는다

 document.getElementById("container").appendChild(newN)


    </script>

</body>
</html>
