<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>속성 가져오거나 수정하기 메서드</title>
  </head>
  <body>
    <a href="https://www.naver.com">네이버</a>
    <script>
      //속성을 가져오기 메서드
      //기본형: getAttribute("속성명")
      const aEl = document.querySelector("a");
      console.log(aEl);
      const href = aEl.getAttribute("href");
      console.log(href);
      //   속성을 수정하기 메서드
      // 기본형
      // setAttribute("속성명" , "값")
      aEl.setAttribute("href", "https://www.google.com");
      console.log(aEl);
      aEl.innerText = "구글";
      aEl.setAttribute("target" , "_blank");
      aEl.setAttribute("title" , "구글로 이동");
      aEl.setAttribute("class" , "google_link");
      aEl.setAttribute("id" , "google_link");
    </script>
  </body>
</html>
