<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #result span {
        color: red;
      }
      #big {
        width: 200px;
        border: 3px solid #333;
      }
      .imgBox img {
        width: 100px;
        border: 3px solid transparent;
        transition: all 0.3s;
      }
      .imgBox img:hover,
      .imgBox img.active {
        border-color: red;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <ul id="menu">
      <li>회사소개</li>
      <li>제품소개</li>
      <li>고객센터</li>
    </ul>
    <div id="result">
      <!-- 내가클릭한 글자 js출력 -->
    </div>
    <!-- 클릭한 이미지 크게 보이기 -->
    <!-- 큰이미지 -->
    <img src="images/cup-1.png" alt="redcup" id="big" />
    <!-- 작은 이미지 -->
    <div class="imgBox">
      <img src="images/cup-1.png" alt="" />
      <img src="images/cup-2.png" alt="" />
    </div>
    <!--  삭제 버튼 만들기 -->
    <ul id="todo">
      <li>공부하기 <button>삭제</button></li>
      <li>운동하기 <button>삭제</button></li>
      <li>청소하기 <button>삭제</button></li>
    </ul>
    <script>
      const menu = document.querySelector("#menu");
      const result = document.querySelector("#result");
      menu.addEventListener("click", (e) => {
        console.log(e.target);
        // alert(`${e.target.innerText}클릭`)
        result.innerHTML = `
            <p>내가 클릭한 메뉴 : <span> ${e.target.innerText} </span> </p>
            `;
      });
      // 작은이미지 클릭시
      const imgBox = document.querySelector(".imgBox");
      const big = document.querySelector("#big");
      imgBox.addEventListener("click", (e) => {
        console.log(e.target.src);
        // 큰이미지 변경
        big.src = e.target.src;
        // 이미지들을 forEach해서 active를 지운다
        const imgs = document.querySelectorAll(".imgBox img");
        imgs.forEach((img) => {
          //   console.log(img);
          img.classList.remove("active");
        });
        e.target.classList.toggle("active");
      });
      //   삭제 버튼 만들기
      const todo = document.querySelector("#todo");
      todo.addEventListener("click", (e) => {
        // console.log(e.target.tagName);

        if(e.target.tagName === "BUTTON"){
            // 클릭한 버튼의 부모요소를 지운다
            e.target.parentElement.remove()
        }
      });
    </script>
  </body>
</html>
